name: Build & Release APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Read app version
        id: version
        run: |
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K\d+' app/build.gradle.kts)
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Detected: $VERSION_NAME (code $VERSION_CODE)"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: on-success

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleFossDebug --console=plain --warning-mode summary

      - name: Locate and rename APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          DIR=$(dirname "$APK")
          TAG="v${{ steps.version.outputs.version_name }}-car"
          mv "$APK" "$DIR/Metrolist-AndroidCar-$TAG.apk"
          echo "apk_path=$DIR/Metrolist-AndroidCar-$TAG.apk" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Renamed to: Metrolist-AndroidCar-$TAG.apk"

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.apk.outputs.tag }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Metrolist Android Car $TAG" \
            --latest \
            "${{ steps.apk.outputs.apk_path }}"
