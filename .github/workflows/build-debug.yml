name: Build Foss Debug

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: on-success

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate temporary debug keystore
        run: |
          keytool -genkeypair \
            -keystore app/ci-debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Metrolist CI,O=Metrolist,C=US"

      - name: Build and lint Foss Debug APK
        env:
          METROLIST_DEBUG_KEYSTORE_PATH: ci-debug.keystore
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
        run: ./gradlew :app:assembleFossDebug :app:lintFossDebug --console=plain --warning-mode summary

      - name: Upload Foss Debug APK
        uses: actions/upload-artifact@v6
        with:
          name: Metrolist-AndroidCar-Foss-Debug
          path: app/build/outputs/apk/foss/debug/*.apk
          if-no-files-found: error
          retention-days: 14
