name: Build & Release Foss

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.apk.outputs.artifact_name }}
      release_name: ${{ steps.apk.outputs.release_name }}
      version_name: ${{ steps.version.outputs.version_name }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Read app version
        id: version
        run: |
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: on-success

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          for secret_name in RELEASE_KEYSTORE_BASE64 RELEASE_STORE_PASSWORD RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing $secret_name."
              exit 1
            fi
          done
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > app/ci-release.keystore

      - name: Build and lint Foss Release APK
        env:
          METROLIST_RELEASE_KEYSTORE_PATH: ci-release.keystore
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
        run: ./gradlew :app:assembleFossRelease :app:lintFossRelease --console=plain --warning-mode summary

      - name: Prepare Foss Release APK
        id: apk
        run: |
          VERSION_NAME="${{ steps.version.outputs.version_name }}"
          RELEASE_NAME="Metrolist-AndroidCar-v${VERSION_NAME}-car.apk"
          ARTIFACT_NAME="Metrolist-AndroidCar-v${VERSION_NAME}-car"
          cp app/build/outputs/apk/foss/release/app-foss-release.apk "$RUNNER_TEMP/$RELEASE_NAME"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload Foss Release APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.apk.outputs.artifact_name }}
          path: ${{ runner.temp }}/${{ steps.apk.outputs.release_name }}
          if-no-files-found: error
          retention-days: 14

  release:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Foss Release APK
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: release

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NAME: ${{ needs.build.outputs.release_name }}
          VERSION_NAME: ${{ needs.build.outputs.version_name }}
        run: |
          TAG="v${VERSION_NAME}-car"
          APK="release/${RELEASE_NAME}"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if gh release view "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --json assets \
              --jq '.assets[].name' | grep -Fxq "$RELEASE_NAME"; then
              echo "Release $TAG already contains $RELEASE_NAME; nothing to publish."
              exit 0
            fi

            gh release upload "$TAG" "$APK" --repo "$GITHUB_REPOSITORY"
            exit 0
          fi

          gh release create "$TAG" "$APK" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes "Metrolist Android Car $TAG (FOSS Release APK)" \
            --latest
